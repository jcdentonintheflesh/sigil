<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" fill="#101018"/>

  <!-- Outer diamond/rhombus frame - the sigil boundary -->
  <path d="M256 72 L420 256 L256 440 L92 256 Z"
        fill="none" stroke="#8DD8FF" stroke-width="8"/>

  <!-- Inner eye shape - horizontal almond/vesica -->
  <path d="M138 256 Q256 168 374 256 Q256 344 138 256 Z"
        fill="none" stroke="#FF4D8A" stroke-width="6"/>

  <!-- Central vertical line with serifs - the "I" / markdown heading marker -->
  <path d="M256 148 L256 364 M228 148 L284 148 M228 364 L284 364"
        fill="none" stroke="#8DD8FF" stroke-width="8" stroke-linecap="square"/>

  <!-- Pupil dot - the focal point -->
  <circle cx="256" cy="256" r="16" fill="#FF4D8A"/>
</svg>